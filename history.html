<!DOCTYPE html>
<html lang="th">
<head>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="icon-192.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการเล่นย้อนหลัง</title>
    <style>
        :root {
            --primary: #3b82f6; --success: #10b981; --danger: #ef4444; 
            --dark: #1e293b; --light: #f1f5f9; --warning: #f59e0b; 
            --teal: #0ea5e9; --purple: #8b5cf6; --bg: #f8fafc; --card: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 800px; margin: 0 auto; }
        
        .top-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; gap: 15px; }
        .btn-back { background-color: var(--dark); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; transition: background 0.2s; }
        .btn-back:hover { background-color: #334155; }
        h1 { margin: 0; font-size: 24px; color: var(--dark); }
        
        /* Flat Design History Layout */
        .history-card {
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: none;
        }
        .history-details h3 { margin: 0 0 8px 0; color: var(--dark); font-size: 18px; }
        .badge-group { display: flex; gap: 8px; margin-top: 10px; }
        .badge { padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; }
        .badge-players { background: #e0f2fe; color: #0369a1; }
        .badge-matches { background: #f0fdf4; color: #166534; }
        
        .btn-delete {
            background: #fee2e2; color: #ef4444; border: none; padding: 10px 16px;
            border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer;
            transition: background 0.2s;
        }
        .btn-delete:hover { background: #fecaca; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; background: var(--card); border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-header">
            <h1>📅 ประวัติการเล่นย้อนหลัง (3 รอบล่าสุด)</h1>
            <a href="index.html" class="btn-back">⬅ กลับหน้าหลัก</a>
        </div>
        
        <div id="historyListContainer"></div>
    </div>

    <script>
        function renderHistoryList() {
            const historyStr = localStorage.getItem('badminton_past_sessions');
            const historyList = historyStr ? JSON.parse(historyStr) : [];
            const container = document.getElementById('historyListContainer');

            if (historyList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 12px;">📭</div>
                        <p style="margin: 0; font-size: 15px;">ยังไม่มีข้อมูลประวัติการเล่นย้อนหลังในระบบ</p>
                    </div>`;
                return;
            }

            container.innerHTML = historyList.map(item => `
                <div class="history-card">
                    <div class="history-details">
                        <h3>รอบวันที่ ${item.date}</h3>
                        <div class="badge-group">
                            <span class="badge badge-players">👥 ผู้เล่น ${item.playerCount} คน</span>
                            <span class="badge badge-matches">🏸 ทั้งหมด ${item.matchCount} แมตช์</span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteHistory(${item.id})">🗑️ ลบประวัติ</button>
                </div>
            `).join('');
        }

        function deleteHistory(id) {
            if (!confirm('คุณแน่ใจหรือไม่ว่าต้องการลบประวัติการเล่นรอบนี้?')) return;
            
            let historyStr = localStorage.getItem('badminton_past_sessions');
            if (!historyStr) return;

            let historyList = JSON.parse(historyStr);
            // กรองเอาตัวที่ไอดีไม่ตรงออกไปเพื่อลบ
            historyList = historyList.filter(item => item.id !== id);
            
            localStorage.setItem('badminton_past_sessions', JSON.stringify(historyList));
            renderHistoryList();
        }

        // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
        document.addEventListener('DOMContentLoaded', renderHistoryList);
    </script>

    <script>
            // สมัครใช้งาน Service Worker
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('ServiceWorker ทำงานสำเร็จ!'))
                    .catch(err => console.log('ServiceWorker มีปัญหา: ', err));
                });
            }
        </script>

</body>
</html>
